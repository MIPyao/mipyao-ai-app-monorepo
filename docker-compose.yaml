services:
  ai-database:
    # ***** 使用精确的官方 pg16 标签 *****
    image: pgvector/pgvector:pg16-bookworm
    container_name: ai_pg_db
    restart: always
    ports:
      - "5000:5432"
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: ai_rag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
